<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashraf LMS Professional</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
/* ── TEACHER-WORKSPACE DESIGN SYSTEM ── */
:root{
  --nav:#071b34; --nav2:#0d2a50; --blue:#1d66f2; --sky:#eef6ff;
  --green:#16a34a; --amber:#f59e0b; --red:#dc2626; --purple:#7c3aed;
  --ink:#102033; --muted:#64748b; --line:#e2e8f0; --card:#ffffff;
  --bg:#f5f8fc; --shadow:0 18px 45px rgba(15,23,42,.08); --radius:22px;
  /* legacy aliases used by existing LMS JS */
  --primary:#1d66f2; --primary-dark:#1550d0; --success:#16a34a;
  --warning:#f59e0b; --danger:#dc2626; --gold:#f59e0b;
  --sidebar:#071b34; --sidebar-hover:#0d2a50; --text:#102033;
  --border:#e2e8f0; --card:#ffffff; --bg:#f5f8fc;
  --shadow-lg:0 18px 45px rgba(15,23,42,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--ink)}

/* ── LOGIN ── */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#071b34 0%,#0d2a50 50%,#071b34 100%)}
.login-card{background:#fff;border-radius:20px;padding:40px;width:440px;box-shadow:var(--shadow-lg)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .star{font-size:52px}
.login-logo h1{font-size:22px;font-weight:800;color:var(--blue);margin-top:8px}
.login-logo p{color:var(--muted);font-size:12px;margin-top:4px}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.role-btn{padding:14px 10px;border:2px solid var(--line);border-radius:10px;cursor:pointer;text-align:center;background:#fff;transition:all .2s;font-family:inherit}
.role-btn:hover,.role-btn.active{border-color:var(--blue);background:#eef6ff}
.role-btn .ri{font-size:26px;display:block}
.role-btn .rl{font-size:12px;font-weight:700;color:var(--muted);margin-top:4px;display:block}
.role-btn.active .rl{color:var(--blue)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select{width:100%;padding:10px 14px;border:1.5px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.fg input:focus,.fg select:focus{border-color:var(--blue)}
.hint{font-size:11px;color:var(--muted);text-align:center;margin-top:12px}

/* ── BUTTONS ── */
.btn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-warning{background:var(--amber);color:#fff}
.btn-secondary{background:#f1f5f9;color:var(--ink);border:1px solid var(--line)}
.btn-ghost{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.2)}
.btn-ghost:hover{background:rgba(255,255,255,.2)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px}
.btn-lg{padding:13px;font-size:15px;width:100%;justify-content:center}

/* ── APP LAYOUT ── */
.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{background:linear-gradient(180deg,var(--nav),#061225);color:white;padding:24px 18px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.sb-header{display:flex;gap:14px;align-items:center;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,#3b82f6,#38bdf8);display:grid;place-items:center;font-size:26px;box-shadow:0 8px 20px rgba(59,130,246,.35);flex-shrink:0}
.sb-header-text h2{font-size:16px;font-weight:800;margin:0}
.sb-header-text p{font-size:11px;color:#bfdbfe;margin-top:3px}
.sb-header-text .sb-badge{display:inline-block;background:#2563eb;border-radius:999px;padding:3px 9px;font-size:11px;margin-top:5px;font-weight:600}
.sb-nav{flex:1;padding:4px 0}
.sb-section{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:#93c5fd;margin:18px 4px 8px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;color:rgba(255,255,255,.7);font-size:14px;font-weight:500;cursor:pointer;margin:3px 0;transition:all .2s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:linear-gradient(90deg,#1d4ed8,#2563eb);color:#fff;box-shadow:0 6px 18px rgba(37,99,235,.2)}
.nav-item.active{background:linear-gradient(90deg,#1d4ed8,#2563eb);color:#fff;box-shadow:0 8px 22px rgba(37,99,235,.3)}
.nav-item .ni{font-size:16px;width:20px;text-align:center}
.sb-footer{padding-top:16px;border-top:1px solid rgba(255,255,255,.08);margin-top:auto}
.user-row{display:flex;gap:12px;align-items:center}
.avatar{width:42px;height:42px;border-radius:50%;background:#fff;color:#0f172a;display:grid;place-items:center;font-size:14px;font-weight:800;flex-shrink:0}
.user-name{font-size:14px;font-weight:700;color:#fff}
.user-role{font-size:11px;color:#cbd5e1}
.logout-btn{margin-top:12px;width:100%;padding:9px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.15);border-radius:10px;cursor:pointer;font-size:12px;font-family:inherit;transition:all .2s}
.logout-btn:hover{background:rgba(255,255,255,.18);color:#fff}

/* ── MAIN AREA ── */
.main{min-width:0;overflow-x:hidden;display:flex;flex-direction:column}
.topbar{height:70px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);padding:0 32px;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10;flex-shrink:0}
.topbar h1{font-size:20px;font-weight:800;color:var(--ink)}
.topbar-right{display:flex;align-items:center;gap:10px}
.content{padding:24px 32px;flex:1}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.stat-card{background:white;border:1px solid var(--line);border-radius:18px;padding:20px;display:flex;gap:16px;align-items:center;box-shadow:var(--shadow)}
.stat-icon{width:54px;height:54px;border-radius:16px;display:grid;place-items:center;font-size:24px;flex-shrink:0}
.stat-value{font-size:28px;font-weight:800;line-height:1}
.stat-label{font-size:12px;color:var(--muted);margin-top:5px}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);border:1px solid var(--line)}
.card-sm{padding:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:16px;font-weight:700}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* ── DASHBOARD HERO ── */
.dash-hero{display:grid;grid-template-columns:1fr 320px;gap:18px;margin-bottom:18px}
.welcome-card{background:linear-gradient(135deg,#fff,#eef6ff);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.welcome-card h2{font-size:26px;font-weight:800;margin-bottom:6px}
.welcome-card p{color:var(--muted);font-size:14px}
.motto{margin-top:18px;display:inline-flex;gap:8px;align-items:center;background:#dbeafe;color:#1d4ed8;padding:9px 14px;border-radius:999px;font-weight:700;font-size:13px}
.quote-card{background:white;border:1px solid var(--line);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
.quote-card blockquote{font-size:14px;line-height:1.7;color:var(--ink);border-left:3px solid var(--blue);padding-left:14px;margin:12px 0}
.dash-grid{display:grid;grid-template-columns:1fr 1.5fr 1fr;gap:16px;margin-bottom:18px}
.dash-bottom{display:grid;grid-template-columns:1fr 1.5fr 1fr;gap:16px}
.panel{background:white;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.panel-head h3{font-size:15px;font-weight:700;margin:0}
.view-link{color:var(--blue);font-weight:700;font-size:13px;cursor:pointer;text-decoration:none}

/* ── PRIORITIES ── */
.priority{display:grid;grid-template-columns:36px 1fr 20px;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}
.priority:last-child{border-bottom:0}
.p-num{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;color:white;font-weight:900;font-size:13px;flex-shrink:0}

/* ── PROGRESS BARS ── */
.bar{height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:4px}
.fill{height:100%;background:linear-gradient(90deg,#22c55e,#16a34a);border-radius:999px}
.fill-orange{background:linear-gradient(90deg,#f59e0b,#f97316)}
.fill-red{background:linear-gradient(90deg,#ef4444,#dc2626)}
.fill-blue{background:linear-gradient(90deg,#3b82f6,#2563eb)}

/* ── STUDENT SNAPSHOT ── */
.student-row{display:grid;grid-template-columns:40px 1fr 56px;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
.student-row:last-child{border-bottom:0}
.face{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#bfdbfe,#e0e7ff);display:grid;place-items:center;font-weight:800;font-size:14px}
.pct{font-weight:800;font-size:14px}

/* ── QUICK ACTIONS ── */
.actions-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.action-btn{border:1px solid var(--line);border-radius:14px;background:#fbfdff;padding:16px 8px;text-align:center;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s}
.action-btn:hover{border-color:#93c5fd;background:#eef6ff}
.action-btn i{display:block;font-style:normal;font-size:24px;margin-bottom:6px}

/* ── NOTIFICATIONS ── */
.note{display:grid;grid-template-columns:24px 1fr;gap:10px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:13px}
.note:last-child{border-bottom:0}
.note b{display:block;font-size:13px}
.note span{color:var(--muted);font-size:12px}

/* ── EVENTS ── */
.event{display:grid;grid-template-columns:52px 1fr;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
.event:last-child{border-bottom:0}
.event-date{border-radius:12px;background:#eef6ff;color:var(--blue);padding:8px;text-align:center;font-weight:800;font-size:15px}
.event-date small{display:block;font-size:10px;font-weight:600;text-transform:uppercase}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--line)}
.tbl td{padding:11px 12px;font-size:13px;border-bottom:1px solid var(--line)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#f8fafc}

/* ── BADGES & PILLS ── */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase}
.badge-green{background:#d1fae5;color:#065f46}.badge-yellow{background:#fef3c7;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}.badge-blue{background:#dbeafe;color:#1e40af}
.badge-gray{background:#f1f5f9;color:#475569}.badge-gold{background:#fef3c7;color:#b45309}
.score-pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700}
.pill-high{background:#d1fae5;color:#065f46}.pill-mid{background:#fef3c7;color:#92400e}.pill-low{background:#fee2e2;color:#991b1b}
.pill{font-size:12px;font-weight:700;padding:4px 9px;border-radius:999px;background:#dcfce7;color:#15803d}

/* ── TABS ── */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:18px;padding-bottom:0}
.tab{padding:9px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab:hover{color:var(--ink)}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:#fff;border-radius:20px;width:720px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-hd{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.modal-hd h2{font-size:16px;font-weight:700}
.modal-bd{padding:24px}
.modal-ft{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
.close-x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1;padding:4px}
.close-x:hover{color:var(--ink)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.sep{border:none;border-top:1px solid var(--line);margin:16px 0}

/* ── EXAM BUILDER ── */
.q-builder{background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px}
.q-builder-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-weight:700;font-size:14px}
.question-options{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.opt-row{display:flex;align-items:center;gap:10px}
.opt-row input[type=text]{flex:1;padding:7px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;outline:none}
.opt-row input[type=text]:focus{border-color:var(--blue)}
.opt-label{width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── EXAM TAKING ── */
.exam-page{min-height:100vh;background:var(--bg);padding:24px}
.exam-header{background:#fff;border-radius:16px;padding:18px 24px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}
.timer{font-size:22px;font-weight:800;color:var(--red);background:#fee2e2;padding:8px 18px;border-radius:12px}
.pb{height:6px;background:#e5e7eb;border-radius:999px;margin-top:10px;overflow:hidden}
.pb-fill{height:100%;border-radius:999px;transition:width .3s}
.q-card{background:#fff;border-radius:16px;padding:24px;box-shadow:var(--shadow);margin-bottom:16px}
.q-text{font-size:17px;font-weight:600;margin-bottom:18px;line-height:1.5}
.opt{padding:14px 18px;border:2px solid var(--line);border-radius:12px;cursor:pointer;margin-bottom:10px;font-size:14px;transition:all .2s;display:flex;align-items:center;gap:12px}
.opt:hover{border-color:var(--blue);background:#eef6ff}
.opt.selected{border-color:var(--blue);background:#eef6ff}
.opt.correct{border-color:var(--green);background:#d1fae5}
.opt.wrong{border-color:var(--red);background:#fee2e2}
.opt-circle{width:28px;height:28px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.opt.selected .opt-circle,.opt.correct .opt-circle{border-color:var(--blue);background:var(--blue);color:#fff}
.opt.wrong .opt-circle{border-color:var(--red);background:var(--red);color:#fff}
.q-nav{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.q-dot{width:34px;height:34px;border-radius:10px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;font-weight:700;transition:all .2s;background:#fff}
.q-dot.current{border-color:var(--blue);background:var(--blue);color:#fff}
.q-dot.answered{border-color:var(--green);background:#d1fae5;color:#065f46}

/* ── MONITOR ── */
.monitor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:16px}
.sc-card{padding:14px;border-radius:14px;border:1.5px solid var(--line);text-align:center;background:#fff}
.sc-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-id{font-size:11px;color:var(--muted);margin-top:2px}
.sc-status{font-size:11px;font-weight:600;margin-top:6px}
.sc-score{font-size:16px;font-weight:800;margin-top:4px;color:var(--green)}
.s-not-started{border-color:#e5e7eb;background:#f9fafb}
.s-ip{border-color:var(--amber);background:#fffbeb}
.s-sb{border-color:var(--green);background:#f0fdf4}
.s-wn{border-color:var(--red);background:#fef2f2}

/* ── MISC ── */
.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty .ei{font-size:48px;margin-bottom:12px}
.empty h3{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:8px}
.notify{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:14px 20px;border-radius:14px;font-size:14px;font-weight:600;z-index:9999;box-shadow:var(--shadow-lg);animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.text-sm{font-size:13px}.text-xs{font-size:11px}.text-muted{color:var(--muted)}.font-bold{font-weight:700}.mb-3{margin-bottom:12px}
.health{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.chip{background:#f8fafc;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-weight:700;font-size:12px}
.chip.ok{color:#15803d}.chip.warn{color:#b45309}

/* ── GROWTH / LEVEL CARDS ── */
.level-card{border-radius:16px;padding:18px;margin-bottom:14px}
.lh-a1{background:linear-gradient(135deg,#fef3c7,#fde68a)}
.lh-a2{background:linear-gradient(135deg,#d1fae5,#a7f3d0)}
.lh-b1{background:linear-gradient(135deg,#dbeafe,#bfdbfe)}
.lv-a1{background:#fef3c7;color:#92400e}
.lv-a2{background:#d1fae5;color:#065f46}
.lv-b1{background:#dbeafe;color:#1e40af}
.task-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:10px}

@media(max-width:1100px){
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto}
  .dash-hero,.dash-grid,.dash-bottom,.stat-grid{grid-template-columns:1fr}
  .content{padding:18px}
}
</style>
</head>

<div id="app"></div>

    if(s) return s;

  return null;

let _db = null;
let _docRef = null;
let _fbReady = false;
let _snapshotUnsub = null;
let _htmlCol = null;

function initFirebase(){
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    _db = firebase.firestore();
    _docRef = _db.collection('lms').doc('ashraflms');
    _htmlCol = _db.collection('lmsHtmlExams');
    _fbReady = true;
    console.log('✅ Firebase connected');
    // Start real-time listener — updates localStorage whenever Firestore changes
    _snapshotUnsub = _docRef.onSnapshot(snap=>{
      if(snap.exists){
        const remote = snap.data();
        // Merge htmlContent: local wins only if Firestore doesn't have it
        const local = _localStore();
        if(local && local.exams){
          local.exams.forEach(e=>{
            if(e.htmlContent){
              const r=remote.exams?.find(x=>x.id===e.id);
              if(r && !r.htmlContent) r.htmlContent=e.htmlContent;
            }
          });
        }
        localStorage.setItem('alms', JSON.stringify(remote));
        // Re-render live pages
        if(S.user && (S.sub==='monitor'||S.sub==='dashboard'||S.sub==='home'||S.sub==='myexams'||S.sub==='reports')) render();
      }
    }, err=>{ console.warn('Firestore listener error:', err); });
  } catch(e){
    console.warn('Firebase init failed — running offline:', e);
    _fbReady = false;
  }
}

function _localStore(){
  try{ return JSON.parse(localStorage.getItem('alms'))||null; } catch(e){ return null; }
}

function store(){
  try{ return JSON.parse(localStorage.getItem('alms'))||initStore(); }
  catch(e){ return initStore(); }
}

function save(d){
  // Always write localStorage immediately (keeps UI snappy)
  localStorage.setItem('alms', JSON.stringify(d));

  // Firestore fix: keep the main LMS document small.
  // Uploaded HTML exams are saved in their own Firestore documents,
  // so students on other devices can open them from Firebase.
  if(_fbReady && _docRef){
    const forCloud = JSON.parse(JSON.stringify(d));
    const htmlWrites = [];

    if(forCloud.exams){
      forCloud.exams.forEach(e=>{
        if(e.htmlContent && _htmlCol){
          htmlWrites.push({
            id:e.id,
            title:e.title||'',
            classId:e.classId||'',
            htmlContent:e.htmlContent,
            updatedAt:new Date().toISOString()
          });
          e.htmlRef=true;
        }
        delete e.htmlContent;
      });
    }

    _docRef.set(forCloud).catch(e=>console.warn('Firestore save failed:', e));
    htmlWrites.forEach(h=>{
      _htmlCol.doc(h.id).set(h).catch(e=>console.warn('HTML exam save failed:', e));
    });
  }
}

async function loadHtmlExamContent(examId){
  if(!_fbReady || !_htmlCol) return null;
  try{
    const snap = await _htmlCol.doc(examId).get();
    if(snap.exists){
      const data = snap.data();
      return data.htmlContent || null;
    }
  }catch(e){
    console.warn('HTML exam load failed:', e);
  }
  return null;
}

async function loadFromFirestore(){
  if(!_fbReady || !_docRef) return false;
  try{
    const snap = await _docRef.get();
    if(snap.exists){
      const remote = snap.data();
      // Merge htmlContent: local wins only if Firestore doesn't have it
      const local = _localStore();
      if(local && local.exams){
        local.exams.forEach(e=>{
          if(e.htmlContent){
            const r=remote.exams?.find(x=>x.id===e.id);
            if(r && !r.htmlContent) r.htmlContent=e.htmlContent;
          }
        });
      }
      localStorage.setItem('alms', JSON.stringify(remote));
      return true;
    }
  } catch(e){ console.warn('Firestore load failed:', e); }
  return false;
}

  d.levelAssignments={};d.taskCompletions={};d.weeklyScores={};d.currentTermWeek=2;

function $(id){return document.getElementById(id)}

  const n=$('notif'); n.textContent=msg; n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'),dur);
}
function scorePill(s){
  if(s>=85) return `<span class="score-pill pill-high">${s}%</span>`;
  if(s>=65) return `<span class="score-pill pill-mid">${s}%</span>`;
  return `<span class="score-pill pill-low">${s}%</span>`;
}
function gradeLabel(s){
  if(s>=90) return 'Excellent';
  if(s>=80) return 'Very Good';
  if(s>=70) return 'Good';
  if(s>=60) return 'Satisfactory';
  return 'Needs Improvement';
}
function initials(name){return name.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();}
function shortName(name){const p=name.split(' ');return p.length>2?`${p[0]} ${p[p.length-1]}`:name;}
function totalStudents(){return Object.values(CLASSES).reduce((a,b)=>a+b.length,0);}
function avgScore(examId){
  const d=store(); let total=0,count=0;
  for(const k of Object.keys(d.submissions)){
    if(k.startsWith(examId+'_')){total+=d.submissions[k].score;count++;}
  }
  return count?Math.round(total/count):0;
}
function studentScore(examId,studentId){
  const d=store(); const k=`${examId}_${studentId}`;
  return d.submissions[k]||null;
}

function classAvgForExam(examId,cls){
  const d=store();const students=CLASSES[cls]||[];let total=0,count=0;

function classDeactivateExam(id){const d=store();const e=d.exams.find(x=>x.id===id);if(!e)return;e.status='completed';save(d);notify(`✅ "${e.title}" deactivated.`);render();}

  const activeExams=d.exams.filter(e=>e.status==='active');
  if(activeExams.length===0) return `<div class="empty"><div class="ei">📡</div><h3>No Active Exams</h3><p>Activate an exam to start live monitoring.</p></div>`;
  const exam=S.selectedExamId?d.exams.find(e=>e.id===S.selectedExamId):activeExams[0];
  if(!exam) return '';
  const students=CLASSES[exam.classId]||[];
  let ns=0,ip=0,sb=0,wn=0;
  const cards=students.map(s=>{
    const status=d.monitor[s.id]||'not_started';
    const sub=studentScore(exam.id,s.id);
    if(status==='not_started') ns++;
    else if(status==='in_progress') ip++;
    else if(status==='submitted') sb++;
    else if(status==='warning') wn++;
    const label=status==='not_started'?'Not Started':status==='in_progress'?'In Progress':status==='submitted'?'Submitted':'⚠️ Warning';
    const cls=`s-${status.replace('_','-').replace('not-started','ns').replace('in-progress','ip').replace('submitted','sb').replace('warning','wn')}`;
    return `<div class="sc-card ${cls}">
      <div class="sc-name" title="${s.name}">${shortName(s.name)}</div>
      <div class="sc-id">${s.id.slice(-6)}</div>
      <div class="sc-status">${label}</div>
      ${sub?`<div class="sc-score">${sub.score}%</div>`:''}
    </div>`;
  }).join('');
  const examOptions=activeExams.map(e=>`<option value="${e.id}"${e.id===exam.id?' selected':''}>${e.title} (${e.classId})</option>`).join('');
  return `
<div class="stat-grid" style="grid-template-columns:repeat(4,1fr)">
  <div class="stat-card"><div class="stat-icon" style="background:#f1f5f9">⬜</div><div class="stat-value" style="color:var(--muted)">${ns}</div><div class="stat-label">Not Started</div></div>
  <div class="stat-card"><div class="stat-icon" style="background:#fef3c7">⏳</div><div class="stat-value" style="color:var(--warning)">${ip}</div><div class="stat-label">In Progress</div></div>
  <div class="stat-card"><div class="stat-icon" style="background:#d1fae5">✅</div><div class="stat-value" style="color:var(--success)">${sb}</div><div class="stat-label">Submitted</div></div>
  <div class="stat-card"><div class="stat-icon" style="background:#fee2e2">⚠️</div><div class="stat-value" style="color:var(--danger)">${wn}</div><div class="stat-label">Warning</div></div>
</div>
<div class="card">
  <div class="card-header">
    <div style="display:flex;align-items:center;gap:12px">
      <span class="card-title">📡 ${exam.title}</span>
      <select onchange="S.selectedExamId=this.value;render()" style="font-size:13px;padding:6px 10px">${examOptions}</select>
    </div>
    <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)">
      <div style="width:8px;height:8px;border-radius:50%;background:var(--success)"></div>Live — updates every 10s
    </div>
  </div>
  <div class="monitor-grid" id="monitor-grid">${cards}</div>
</div>`;
}

function renderTeacherReports(){
  const d=store();
  const cls=S.selectedClass||'8-1';
  const examForClass=d.exams.filter(e=>e.classId===cls&&e.status!=='draft');
  const exam=examForClass[0];
  const tabs=['8-1','8-2','8-3','8-4'].map(c=>`<div class="tab${c===cls?' active':''}" onclick="S.selectedClass='${c}';render()">${c}</div>`).join('');

  if(!exam) return `<div class="panel"><div class="tabs">${tabs}</div><div class="empty" style="padding:40px"><div class="ei">📄</div><h3>No exams for Class ${cls} yet</h3><p>Activate an exam to see results here.</p></div></div>`;

  const students=CLASSES[cls];
  const scores=students.map(s=>{
    const sub=studentScore(exam.id,s.id);
    return {s,sub,score:sub?sub.score:null};
  }).sort((a,b)=>(b.score||0)-(a.score||0));

  const rows=scores.map(({s,sub,score},i)=>{
    if(!score) return `<tr><td>${i+1}</td><td>${s.name}</td><td class="text-muted">—</td><td>—</td><td>—</td><td><span class="badge badge-gray">Absent</span></td></tr>`;
    const g=gradeLabel(score);
    const fillCls=score>=75?'fill':score>=60?'fill fill-orange':'fill fill-red';
    return `<tr>
      <td style="font-weight:700;color:var(--muted)">${i+1}</td>
      <td><strong>${s.name}</strong></td>
      <td>${scorePill(score)}</td>
      <td>${scorePill(sub.skills?.grammar||0)}</td>
      <td>${scorePill(sub.skills?.reading||0)}</td>
      <td><span class="badge ${score>=85?'badge-green':score>=70?'badge-yellow':'badge-red'}">${g}</span></td>
    </tr>`;
  }).join('');

  const withScores=scores.filter(x=>x.score!==null);
  const avg=withScores.length?Math.round(withScores.reduce((a,b)=>a+b.score,0)/withScores.length):0;
  const highest=withScores.length?Math.max(...withScores.map(x=>x.score)):0;
  const lowest=withScores.length?Math.min(...withScores.map(x=>x.score)):0;

  return `
<div class="tabs" style="margin-bottom:18px">${tabs}</div>
<div class="stat-grid" style="margin-bottom:18px">
  <div class="stat-card"><div class="stat-icon" style="background:#dbeafe">📊</div><div><div class="stat-value" style="color:var(--blue)">${avg}%</div><div class="stat-label">Class Average</div></div></div>
  <div class="stat-card"><div class="stat-icon" style="background:#dcfce7">🏆</div><div><div class="stat-value" style="color:var(--green)">${highest}%</div><div class="stat-label">Highest Score</div></div></div>
  <div class="stat-card"><div class="stat-icon" style="background:#fee2e2">📉</div><div><div class="stat-value" style="color:var(--red)">${lowest}%</div><div class="stat-label">Lowest Score</div></div></div>
  <div class="stat-card"><div class="stat-icon" style="background:#ede9fe">✅</div><div><div class="stat-value" style="color:var(--purple)">${withScores.length}/${students.length}</div><div class="stat-label">Submitted</div></div></div>
</div>
<div class="panel">
  <div class="panel-head"><h3>📄 ${exam.title} — Class ${cls}</h3></div>
  <div style="overflow-x:auto">
    <table class="tbl">
      <thead><tr><th>Rank</th><th>Student</th><th>Overall</th><th>Grammar</th><th>Reading</th><th>Grade</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
</div>`;
}

function bindTeacher(){
  // Chart.js for reports
  if(S.sub==='reports'){
    setTimeout(()=>{
      const c=document.getElementById('score-chart');
      if(c&&window.Chart){
        const d=store();
        const cls=S.selectedClass||'8-1';
        const exam=d.exams.find(e=>e.classId===cls&&e.status!=='draft');
        if(!exam) return;
        const students=CLASSES[cls];
        const labels=[];const vals=[];
        students.forEach(s=>{
          const sub=studentScore(exam.id,s.id);
          if(sub){labels.push(shortName(s.name));vals.push(sub.score);}
        });
        new Chart(c,{type:'bar',data:{labels,datasets:[{label:'Score %',data:vals,backgroundColor:vals.map(v=>v>=85?'#059669':v>=70?'#d97706':'#dc2626')}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{min:0,max:100}}}});
      }
    },100);
  }
  // Start monitor refresh
  if(S.sub==='monitor'){
    if(S.monitorID) clearInterval(S.monitorID);
    S.monitorID=setInterval(()=>{
      const d=store();
      // Simulate some in_progress students progressing
      let changed=false;
      const students=CLASSES['8-2']||[];
      students.forEach(s=>{
        const cur=d.monitor[s.id];
        if(cur==='in_progress'&&Math.random()<0.15){
          d.monitor[s.id]='submitted';
          const exam=d.exams.find(e=>e.id==='exam2');
          if(exam&&!studentScore('exam2',s.id)){
            const score=Math.floor(Math.random()*35)+65;
            d.submissions[`exam2_${s.id}`]={examId:'exam2',studentId:s.id,score,submittedAt:new Date().toISOString(),skills:{grammar:score-5,reading:score+5,vocabulary:score}};
          }
          changed=true;
        } else if(cur==='not_started'&&Math.random()<0.08){
          d.monitor[s.id]='in_progress'; changed=true;
        }
      });
      if(changed){save(d); const grid=$('monitor-grid'); if(grid) render();}
    },10000);
  }
}

function addQ(){addQuestion();showModal(renderExamModal());}
function removeQ(i){newExam.questions.splice(i,1);showModal(renderExamModal());}
function saveExam(status){
  if(!newExam.title){notify('❌ Please enter an exam title');return;}
  if(newExam.questions.length===0){notify('❌ Add at least one question');return;}
  const d=store();
  const exam={...newExam,id:'exam'+Date.now(),status,createdAt:new Date().toISOString().split('T')[0]};
  d.exams.push(exam);
  if(status==='active'){
    (CLASSES[exam.classId]||[]).forEach(s=>{d.monitor[s.id]=d.monitor[s.id]||'not_started';});
  }
  save(d); closeModal(); notify(`✅ Exam "${exam.title}" ${status==='active'?'activated':'saved as draft'}!`);
}
function activateExam(id){
  const d=store(); const e=d.exams.find(x=>x.id===id); if(!e) return;
  e.status='active';
  (CLASSES[e.classId]||[]).forEach(s=>{if(!d.monitor[s.id]) d.monitor[s.id]='not_started';});
  save(d); notify(`✅ "${e.title}" is now live!`); render();
}
function deactivateExam(id){
  const d=store(); const e=d.exams.find(x=>x.id===id); if(!e) return;
  e.status='completed'; save(d); notify(`✅ Exam deactivated.`); render();
}
function goMonitor(id){S.selectedExamId=id;S.sub='monitor';render();}
function selectClass(cls){S.selectedClass=cls;render();}

function showModal(html){
  let a=$('modal-area');
  if(!a){a=document.createElement('div');a.id='modal-area';a.className='overlay';document.body.appendChild(a);}
  a.innerHTML=`<div class="modal">${html}</div>`;
  a.style.display='flex';
  a.onclick=e=>{if(e.target===a) closeModal();};
}
function closeModal(){const a=$('modal-area');if(a) a.style.display='none';}

async function startExam(examId){
  const d=store();
  const exam=d.exams.find(e=>e.id===examId);
  if(!exam) return;
  if(studentScore(examId,S.user.id)) {notify('You already submitted this exam.');return;}
  if(exam.examType==='html'){
    if(!exam.htmlContent){
      notify('⏳ Loading uploaded exam from Firebase...');
      const html = await loadHtmlExamContent(exam.id);
      if(html){
        exam.htmlContent = html;
        const local = store();
        const localExam = local.exams.find(e=>e.id===exam.id);
        if(localExam){ localExam.htmlContent = html; localStorage.setItem('alms', JSON.stringify(local)); }
      }else{
        notify('⚠️ Could not load this uploaded HTML exam from Firebase. Please re-upload it once.');
        return;
      }
    }
    S.sub='examiframe';S.iframeExam=exam;render();return;
  }
  if(!exam.questions||exam.questions.length===0){notify('This exam has no questions added yet.');return;}
  S.examSession={examId,answers:new Array(exam.questions.length).fill(null),currentQ:0,timeLeft:(exam.timeLimit||30)*60,started:Date.now()};
  d.monitor[S.user.id]='in_progress';
  localStorage.setItem('alms', JSON.stringify(d));
  if(_fbReady && _docRef){
    const mo={};mo[`monitor.${S.user.id}`]='in_progress';
    _docRef.update(mo).catch(()=>save(d));
  }
  S.view='exam'; render();
}


function escapeHtmlAttr(str){
  return String(str||'')
    .replace(/&/g,'&amp;')
    .replace(/"/g,'&quot;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function prepareExternalExamHtml(html){
  const bridge = `
<script>
(function(){
  function textScore(){
    var txt=(document.body&&document.body.innerText||'').replace(/\s+/g,' ');
    var m=txt.match(/(?:score|result|mark|grade)\D{0,30}(\d{1,3})\s*%/i) || txt.match(/(\d{1,3})\s*%\s*(?:score|result|mark|grade)/i);
    if(m){var n=parseInt(m[1],10); if(n>=0&&n<=100) return n;}
    var f=txt.match(/(?:score|result|mark|grade)\D{0,30}(\d{1,3})\s*\/\s*(\d{1,3})/i);
    if(f){var a=parseInt(f[1],10), b=parseInt(f[2],10); if(b>0) return Math.round(a/b*100);}
    return null;
  }
  function send(doneOnly){
    var score=textScore();
    parent.postMessage({type:'ashraf-lms-external-submit',score:score,doneOnly:!!doneOnly},'*');
  }
  window.ashrafLmsSubmit=function(score){
    parent.postMessage({type:'ashraf-lms-external-submit',score:score},'*');
  };
  document.addEventListener('click',function(e){
    var t=(e.target&&e.target.innerText||e.target&&e.target.value||'').toLowerCase();
    if(/submit|finish|completed|complete|end test|show result|result/.test(t)){
      setTimeout(function(){send(true);},900);
    }
  },true);
  document.addEventListener('submit',function(){setTimeout(function(){send(true);},900);},true);
})();
<\/script>`;
  if(/<\/body>/i.test(html)) return html.replace(/<\/body>/i, bridge+'</body>');
  return html + bridge;
}

function extractExternalScoreFromFrame(){
  try{
    const fr=document.getElementById('external-exam-frame');
    const doc=fr&&fr.contentWindow&&fr.contentWindow.document;
    const txt=(doc&&doc.body&&doc.body.innerText||'').replace(/\s+/g,' ');
    let m=txt.match(/(?:score|result|mark|grade)\D{0,30}(\d{1,3})\s*%/i) || txt.match(/(\d{1,3})\s*%\s*(?:score|result|mark|grade)/i);
    if(m){const n=parseInt(m[1],10); if(n>=0&&n<=100) return n;}
    m=txt.match(/(?:score|result|mark|grade)\D{0,30}(\d{1,3})\s*\/\s*(\d{1,3})/i);
    if(m){const a=parseInt(m[1],10),b=parseInt(m[2],10); if(b>0) return Math.round(a/b*100);}
  }catch(e){console.warn('Could not read external exam score:',e);}
  return null;
}

function saveExternalExamSubmission(score){
  if(!S.iframeExam||!S.user) return;
  const d=store();
  const exam=S.iframeExam;
  const subKey=`${exam.id}_${S.user.id}`;
  const finalScore=(typeof score==='number'&&score>=0&&score<=100)?Math.round(score):100;
  const sub={examId:exam.id,studentId:S.user.id,score:finalScore,submittedAt:new Date().toISOString(),skills:{external:finalScore},answers:[],externalHtml:true};
  if(!d.submissions)d.submissions={};
  if(!d.monitor)d.monitor={};
  if(!d.stars)d.stars={};
  d.submissions[subKey]=sub;
  d.monitor[S.user.id]='submitted';
  let earned=10;
  if(finalScore>=90) earned+=15; else if(finalScore>=80) earned+=8; else if(finalScore>=70) earned+=4;
  if(finalScore===100) earned+=20;
  d.stars[S.user.id]=(d.stars[S.user.id]||0)+earned;
  localStorage.setItem('alms', JSON.stringify(d));
  if(_fbReady&&_docRef){
    const patch={submissions:{},monitor:{},stars:{}};
    patch.submissions[subKey]=sub;
    patch.monitor[S.user.id]='submitted';
    patch.stars[S.user.id]=d.stars[S.user.id];
    _docRef.set(patch,{merge:true}).catch(err=>{console.warn('External exam Firestore submit failed:',err);save(d);});
  }
  S.iframeExam=null;
  S.sub='myexams';
  render();
  setTimeout(()=>notify(`✅ Test completed and sent to teacher. Score: ${finalScore}%`,5000),150);
}

function finishExternalExam(){
  const score=extractExternalScoreFromFrame();
  saveExternalExamSubmission(score);
}

    </div>
  </div>

function bindExam(){
  if(S.examTimerID) clearInterval(S.examTimerID);
  S.examTimerID=setInterval(()=>{
    S.examSession.timeLeft--;
    const timer=$('exam-timer');
    if(timer){
      const t=S.examSession.timeLeft;
      const m=Math.floor(t/60).toString().padStart(2,'0');
      const s=(t%60).toString().padStart(2,'0');
      timer.textContent=`⏱ ${m}:${s}`;
      timer.className=t<300?'timer-box':t<600?'timer-box warn':'timer-box ok';
    }
    if(S.examSession.timeLeft<=0){clearInterval(S.examTimerID);submitExam();}
  },1000);
}

function selectAnswer(i){
  S.examSession.answers[S.examSession.currentQ]=i;
  const d=store();
  const exam=d.exams.find(e=>e.id===S.examSession.examId);
  const q=exam.questions[S.examSession.currentQ];
  // Re-render just the options
  document.querySelectorAll('.q-opt').forEach((el,idx)=>el.classList.toggle('sel',idx===i));
  // Update dot
  document.querySelectorAll('.q-dot').forEach((el,idx)=>{
    el.classList.toggle('answered',S.examSession.answers[idx]!==null);
    el.classList.toggle('current',idx===S.examSession.currentQ);
  });
  // Update answered count
  const answered=S.examSession.answers.filter(a=>a!==null).length;
  const countEl=document.querySelector('.exam-hd .text-xs');
  if(countEl) countEl.textContent=`${answered}/${exam.questions.length} answered`;
}

function goToQ(i){
  const d=store();
  const exam=d.exams.find(e=>e.id===S.examSession.examId);
  if(i<0||i>=exam.questions.length) return;
  S.examSession.currentQ=i;
  render();
}

function submitExam(){
  if(S.examTimerID){clearInterval(S.examTimerID);S.examTimerID=null;}
  const d=store();
  const exam=d.exams.find(e=>e.id===S.examSession.examId);
  const {answers}=S.examSession;
  let correct=0; const skillCorrect={}; const skillTotal={};
  exam.questions.forEach((q,i)=>{
    skillTotal[q.skill]=(skillTotal[q.skill]||0)+1;
    if(answers[i]===q.correct){correct++;skillCorrect[q.skill]=(skillCorrect[q.skill]||0)+1;}
  });
  const score=Math.round((correct/exam.questions.length)*100);
  const skills={};
  Object.keys(skillTotal).forEach(sk=>{ skills[sk]=Math.round(((skillCorrect[sk]||0)/skillTotal[sk])*100); });
  const sub={examId:exam.id,studentId:S.user.id,score,submittedAt:new Date().toISOString(),skills,answers};
  const subKey=`${exam.id}_${S.user.id}`;
  d.submissions[subKey]=sub;
  d.monitor[S.user.id]='submitted';
  // Award stars
  let earned=10;
  if(score>=90) earned+=15;
  else if(score>=80) earned+=8;
  else if(score>=70) earned+=4;
  if(score===100) earned+=20;
  d.stars[S.user.id]=(d.stars[S.user.id]||0)+earned;
  if(!d.levelAssignments)d.levelAssignments={};
  if(!d.levelAssignments[S.user.id]){const lvl=getLevelFromScore(score);d.levelAssignments[S.user.id]={level:lvl,placementScore:score,assignedDate:new Date().toISOString().split('T')[0],levelHistory:[{level:lvl,date:new Date().toISOString().split('T')[0]}]};}
  // Save to localStorage immediately
  localStorage.setItem('alms', JSON.stringify(d));
  // Write ONLY the student's fields to Firestore — prevents race conditions between students
  if(_fbReady && _docRef){
    const patch={submissions:{},monitor:{},stars:{}};
    patch.submissions[subKey]=sub;
    patch.monitor[S.user.id]='submitted';
    patch.stars[S.user.id]=d.stars[S.user.id];
    _docRef.set(patch,{merge:true}).catch(err=>{
      console.warn('Firestore submit failed:', err);
      save(d);
    });
  }
  // Show result
  S.view='app'; S.sub='myexams';
  render();
  setTimeout(()=>{
    showModal(`
<div class="modal-hd"><h2>🎉 Exam Submitted!</h2><button class="close-x" onclick="closeModal()">×</button></div>
<div class="modal-bd" style="text-align:center;padding:40px">
  <div style="font-size:72px;font-weight:900;color:${score>=70?'var(--success)':'var(--danger)'}">${score}%</div>
  <div style="font-size:18px;font-weight:700;margin:12px 0">${gradeLabel(score)}</div>
  <div style="font-size:14px;color:var(--muted);margin-bottom:20px">${correct} out of ${exam.questions.length} correct</div>
  <div style="background:#fef3c7;border-radius:10px;padding:16px;margin-bottom:20px">
    <div style="font-size:32px">⭐</div>
    <div style="font-size:22px;font-weight:800;color:#92400e">+${earned} Stars Earned!</div>
  </div>
  <button class="btn btn-primary" onclick="closeModal();S.sub='growth';render()">View Growth Center →</button>
</div>`);
  },100);
}

// ── Helpers ──
function getLevelFromScore(score){if(score>=80)return 'b1';if(score>=65)return 'a2';if(score>=50)return 'a1';return 'pre-a1';}
function getStudentLevel(sid){const d=store();if(d.levelAssignments&&d.levelAssignments[sid])return d.levelAssignments[sid].level;const subs=Object.values(d.submissions).filter(s=>s.studentId===sid);if(!subs.length)return null;return getLevelFromScore(Math.max(...subs.map(s=>s.score)));}
function levelPill(lv){if(!lv||!LEVEL_CONFIG[lv])return '<span class="level-pill lv-a2">—</span>';const c=LEVEL_CONFIG[lv];return `<span class="level-pill ${c.pillClass}">${c.icon} ${c.label}</span>`;}
function getTasksForLevel(level,weekNum){const bank=TASK_BANK[level];if(!bank||!bank.length)return[];return bank[((weekNum-1)%bank.length+bank.length)%bank.length]||[];}
function getWeekCompletions(sid,weekNum){const d=store();return(d.taskCompletions&&d.taskCompletions[sid]&&d.taskCompletions[sid]['w'+weekNum])||[false,false,false,false,false];}
function getWeeklyAvg(sid){const d=store();const ws=(d.weeklyScores&&d.weeklyScores[sid])||[];return ws.length?Math.round(ws.reduce((a,b)=>a+b.score,0)/ws.length):0;}
function getConsecutiveGoodWeeks(sid){const d=store();const lv=getStudentLevel(sid);if(!lv||!LEVEL_CONFIG[lv])return 0;const ws=(d.weeklyScores&&d.weeklyScores[sid])||[];const thr=LEVEL_CONFIG[lv].promoAvg||75;let n=0;for(let i=ws.length-1;i>=0;i--){if(ws[i].score>=thr)n++;else break;}return n;}
function canPromote(sid){const lv=getStudentLevel(sid);if(!lv||!LEVEL_CONFIG[lv]||!LEVEL_CONFIG[lv].nextLevel)return false;return getConsecutiveGoodWeeks(sid)>=(LEVEL_CONFIG[lv].promoWeeks||4);}

// ── Teacher: Remedial Plans ──
function renderTeacherRemedial(){
  const d=store();const cls=S.selectedClass||'8-1';
  const tabs=['8-1','8-2','8-3','8-4'].map(c=>`<div class="tab${c===cls?' active':''}" onclick="S.selectedClass='${c}';render()">${c}</div>`).join('');
  const students=CLASSES[cls]||[];
  const groups={'pre-a1':[],'a1':[],'a2':[],'b1':[],'none':[]};
  students.forEach(s=>{const lv=getStudentLevel(s.id);if(lv&&groups[lv])groups[lv].push(s);else groups['none'].push(s);});
  const lvOrder=['b1','a2','a1','pre-a1'];
  const summaryCards=lvOrder.map(lv=>{const cfg=LEVEL_CONFIG[lv];const n=groups[lv].length;return`<div class="stat-card" style="border-top:4px solid ${cfg.color}"><div style="font-size:26px">${cfg.icon}</div><div class="stat-value" style="color:${cfg.color};font-size:24px">${n}</div><div class="stat-label">${cfg.label} Students</div><div style="font-size:11px;color:var(--muted);margin-top:4px">${cfg.scoreRange}</div></div>`;}).join('');
  const tables=lvOrder.map(lv=>{
    const sts=groups[lv];if(!sts.length)return'';
    const cfg=LEVEL_CONFIG[lv];
    const rows=sts.map(s=>{const sub=Object.values(d.submissions).filter(x=>x.studentId===s.id).sort((a,b)=>b.score-a.score)[0];const score=sub?sub.score:null;const wAvg=getWeeklyAvg(s.id);const gw=getConsecutiveGoodWeeks(s.id);const ready=canPromote(s.id);return`<tr><td><strong>${s.name}</strong><div class="text-xs text-muted">${s.id}</div></td><td>${score!=null?scorePill(score):'<span class="text-muted">—</span>'}</td><td>${levelPill(lv)}</td><td>${wAvg?`<span style="font-weight:700;color:${wAvg>=(cfg.promoAvg||75)?'var(--success)':'var(--warning)'}">${wAvg}%</span>`:'—'}</td><td>${gw}/${cfg.promoWeeks||4} wks</td><td>${ready?'<span class="badge badge-green">✅ Ready</span>':'<span class="badge badge-gray">In Progress</span>'}</td><td><button class="btn btn-primary btn-sm" onclick="openPlanModal('${s.id}','${lv}')">View Plan</button></td></tr>`;}).join('');
    return`<div class="level-header ${cfg.headerClass}" style="margin-top:18px"><div style="font-size:26px">${cfg.icon}</div><div><div style="font-size:15px;font-weight:800;color:${cfg.color2}">${cfg.name} — ${sts.length} students</div><div style="font-size:12px;color:var(--muted)">Promote: avg ≥${cfg.promoAvg||'—'}% for ${cfg.promoWeeks||'—'} wks + Test ≥${cfg.promoTestScore||'—'}%</div></div></div><div class="card" style="margin-bottom:4px"><div style="padding:10px 14px;background:#f8fafc;border-radius:8px;font-size:13px;margin-bottom:10px"><strong>Focus:</strong> ${cfg.focus.slice(0,2).join(' • ')}</div><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Student</th><th>Placement</th><th>Level</th><th>Weekly Avg</th><th>Good Weeks</th><th>Status</th><th>Plan</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  }).join('');
  return`<div class="card" style="margin-bottom:20px"><div class="tabs">${tabs}</div><div class="card-header"><span class="card-title">Level Distribution — Class ${cls}</span><span class="text-muted text-sm">Based on Placement Test (Exam 1)</span></div><div class="stat-grid" style="grid-template-columns:repeat(4,1fr)">${summaryCards}</div></div><div class="card" style="margin-bottom:16px;background:#fffbeb;border:1.5px solid #fcd34d"><div style="font-size:13px;font-weight:700;color:#92400e;margin-bottom:8px">📋 Promotion Criteria</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;font-size:12px"><div>${levelPill('pre-a1')}<div style="margin-top:6px;color:var(--muted)">→ A1: avg ≥75% for 4 weeks + Level Test ≥70%</div></div><div>${levelPill('a1')}<div style="margin-top:6px;color:var(--muted)">→ A2: avg ≥80% for 4 weeks + Level Test ≥75%</div></div><div>${levelPill('a2')}<div style="margin-top:6px;color:var(--muted)">→ B1: avg ≥80% for 4 weeks + Level Test ≥80%</div></div></div></div>${tables}<div id="plan-modal-area"></div>`;
}

function openPlanModal(sid,lv){

  const ws=(d.weeklyScores&&d.weeklyScores[sid])||[];const gw=getConsecutiveGoodWeeks(sid);const ready=canPromote(sid);
  const nextCfg=cfg.nextLevel?LEVEL_CONFIG[cfg.nextLevel]:null;const promoPct=Math.min(100,Math.round((gw/(cfg.promoWeeks||4))*100));
  const focusHtml=cfg.focus.map((f,i)=>`<div class="plan-focus-item"><div class="pfi-num" style="background:${cfg.color}">${i+1}</div><div style="font-size:13px">${f}</div></div>`).join('');
  const resHtml=cfg.resources.map(r=>`<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">📌 ${r}</div>`).join('');
  const wkRows=ws.length?ws.map(w=>`<tr><td>Week ${w.week}</td><td>${w.date}</td><td>${w.tasksCompleted}/5</td><td>${scorePill(w.score)}</td><td>${w.score>=(cfg.promoAvg||75)?'<span class="badge badge-green">✅</span>':'<span class="badge badge-yellow">Below</span>'}</td></tr>`).join(''):'<tr><td colspan="5" style="color:var(--muted);text-align:center">No weekly data yet</td></tr>';
  showModal(`<div class="modal-hd"><div><h2>${stu?.name||sid}</h2><div style="margin-top:3px">${levelPill(lv)} <span style="font-size:12px;color:var(--muted);margin-left:6px">Placement: ${la?.placementScore||'—'}% • ${la?.assignedDate||'—'}</span></div></div><button class="close-x" onclick="closeModal()">×</button></div><div class="modal-bd"><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px"><div style="background:${cfg.bg};border-radius:10px;padding:14px"><div style="font-size:11px;font-weight:700;color:${cfg.color};margin-bottom:8px">📌 FOCUS AREAS</div>${focusHtml}<div style="margin-top:12px;background:#fff;border-radius:8px;padding:10px"><div style="font-size:11px;font-weight:700;color:var(--muted)">WEEKLY GOAL</div><div style="font-size:13px;margin-top:4px">${cfg.weeklyGoal}</div></div></div><div><div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px">📚 RESOURCES</div>${resHtml}<div style="margin-top:12px;background:#fffbeb;border-radius:8px;padding:10px"><div style="font-size:11px;font-weight:700;color:var(--warning)">💡 TEACHER NOTE</div><div style="font-size:12px;margin-top:4px;color:var(--muted)">${cfg.teacherNote}</div></div></div></div><div class="promo-bar" style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><strong>Progress${nextCfg?' → '+nextCfg.name:' (Top Level ✨)'}</strong><span style="color:var(--muted)">${gw}/${cfg.promoWeeks||4} qualifying weeks</span></div><div class="promo-track"><div class="promo-fill" style="width:${promoPct}%;background:${cfg.color}"></div></div><div style="font-size:12px;margin-top:6px;color:${ready?'var(--success)':'var(--muted)'}">${ready?`✅ Give Level Test (≥${cfg.promoTestScore}%) to confirm promotion.`:`${(cfg.promoWeeks||4)-gw} more qualifying week(s) needed at ≥${cfg.promoAvg||75}%.`}</div></div><div><div style="font-size:13px;font-weight:700;margin-bottom:8px">📅 Weekly Scores</div><table class="tbl"><thead><tr><th>Week</th><th>Date</th><th>Tasks</th><th>Score</th><th>Status</th></tr></thead><tbody>${wkRows}</tbody></table></div></div><div class="modal-ft">${ready&&nextCfg?`<button class="btn btn-success btn-sm" onclick="promoteStudent('${sid}','${cfg.nextLevel}')">✅ Promote to ${nextCfg.label}</button>`:''}<button class="btn btn-primary btn-sm" onclick="closeModal()">Close</button></div>`);
}

function promoteStudent(sid,newLevel){
  const d=store();if(!d.levelAssignments)d.levelAssignments={};
  const old=d.levelAssignments[sid]?.level;const hist=(d.levelAssignments[sid]?.levelHistory||[]);
  hist.push({level:newLevel,date:new Date().toISOString().split('T')[0]});
  d.levelAssignments[sid]={level:newLevel,placementScore:d.levelAssignments[sid]?.placementScore,assignedDate:d.levelAssignments[sid]?.assignedDate,levelHistory:hist};
  d.weeklyScores=d.weeklyScores||{};d.weeklyScores[sid]=[];
  save(d);closeModal();notify(`✅ ${findStudent(sid)?.name?.split(' ')[0]} promoted ${old?.toUpperCase()}→${newLevel.toUpperCase()}!`,4000);render();
}

// ── Teacher: Task Bank ──
function renderTeacherTaskBank(){
  const d=store();const lvl=S.taskBankLevel||'a2';const week=S.taskBankWeek||(d.currentTermWeek||2);
  const cfg=LEVEL_CONFIG[lvl];const tasks=getTasksForLevel(lvl,week);
  const lvTabs=['pre-a1','a1','a2','b1'].map(lv=>`<div class="tab${lv===lvl?' active':''}" onclick="S.taskBankLevel='${lv}';render()" style="${lv===lvl?'color:'+LEVEL_CONFIG[lv].color+';border-bottom-color:'+LEVEL_CONFIG[lv].color:''}">${LEVEL_CONFIG[lv].icon} ${LEVEL_CONFIG[lv].label}</div>`).join('');
  const allStu=Object.values(CLASSES).flat();const lvStu=allStu.filter(s=>getStudentLevel(s.id)===lvl);
  const taskCards=tasks.map((t,i)=>{let done=0;lvStu.forEach(s=>{if(getWeekCompletions(s.id,week)[i])done++;});const pct=lvStu.length?Math.round((done/lvStu.length)*100):0;return`<div class="card" style="margin-bottom:12px;border-left:4px solid ${cfg.color}"><div style="display:flex;gap:14px;align-items:flex-start"><div class="task-type-icon" style="background:${t.bg}">${t.icon}</div><div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div><span style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase">Task ${i+1} — ${t.type}</span> <span class="chip">${t.skill}</span></div><div style="font-size:12px;color:var(--muted)"><span style="font-weight:700;color:${pct>=80?'var(--success)':pct>=50?'var(--warning)':'var(--danger)'}">${done}/${lvStu.length}</span> done (${pct}%)</div></div><div style="font-size:13px;line-height:1.6;margin-bottom:8px">${t.task}</div><div class="pb"><div class="pb-fill" style="width:${pct}%;background:${pct>=80?'var(--success)':pct>=50?'var(--warning)':'var(--danger)'}"></div></div></div></div></div>`;}).join('');
  return`<div class="card" style="margin-bottom:20px"><div class="tabs">${lvTabs}</div><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px"><div><div class="card-title">${cfg.icon} ${cfg.name} — Task Bank</div><div class="text-sm text-muted">${lvStu.length} students at this level</div></div><div class="week-nav"><button onclick="S.taskBankWeek=Math.max(1,(S.taskBankWeek||2)-1);render()">← Prev</button><span class="wk-label">Week ${week}</span><button onclick="S.taskBankWeek=(S.taskBankWeek||2)+1;render()">Next →</button></div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px"><div class="card card-sm" style="background:${cfg.bg}"><div style="font-size:11px;font-weight:700;color:${cfg.color2}">🎯 WEEK ${week} GOAL</div><div style="font-size:13px;margin-top:6px">${cfg.weeklyGoal}</div></div><div class="card card-sm"><div style="font-size:11px;font-weight:700;color:var(--muted)">📌 FOCUS THIS WEEK</div><div style="font-size:13px;margin-top:6px">${cfg.focus[(week-1)%cfg.focus.length]||cfg.focus[0]}</div></div></div><div style="font-size:15px;font-weight:700;margin-bottom:12px">5 Tasks — ${cfg.label} Level (Week ${week})</div>${taskCards||'<div class="empty"><div class="ei">📋</div><h3>No tasks defined</h3></div>'}`;
}

// ── Teacher: Progress Tracker ──
function renderTeacherProgress(){
  const d=store();const cls=S.selectedClass||'8-1';const pTab=S.progressTab||'weekly';
  const tabs=['8-1','8-2','8-3','8-4'].map(c=>`<div class="tab${c===cls?' active':''}" onclick="S.selectedClass='${c}';render()">${c}</div>`).join('');
  const pTabs=['weekly','monthly','term'].map(t=>`<div class="tab${t===pTab?' active':''}" onclick="S.progressTab='${t}';render()">${t.charAt(0).toUpperCase()+t.slice(1)}</div>`).join('');
  const students=CLASSES[cls]||[];const week=d.currentTermWeek||2;let inner='';
  if(pTab==='weekly'){
    const totalDone=students.reduce((a,s)=>a+getWeekCompletions(s.id,week).filter(Boolean).length,0);

function toggleTask(idx){
  const uid=S.user.id;const d=store();const week=d.currentTermWeek||2;const key='w'+week;
  if(!d.taskCompletions)d.taskCompletions={};if(!d.taskCompletions[uid])d.taskCompletions[uid]={};
  if(!d.taskCompletions[uid][key])d.taskCompletions[uid][key]=[false,false,false,false,false];
  d.taskCompletions[uid][key][idx]=!d.taskCompletions[uid][key][idx];
  const done=d.taskCompletions[uid][key].filter(Boolean).length;
  if(done===5){const sub=Object.values(d.submissions).filter(s=>s.studentId===uid).sort((a,b)=>b.score-a.score)[0];const base=sub?sub.score:65;const score=Math.min(99,base+Math.floor(Math.random()*6));if(!d.weeklyScores)d.weeklyScores={};if(!d.weeklyScores[uid])d.weeklyScores[uid]=[];const idx2=d.weeklyScores[uid].findIndex(w=>w.week===week);const entry={week,score,tasksCompleted:5,date:new Date().toISOString().split('T')[0]};if(idx2>=0)d.weeklyScores[uid][idx2]=entry;else d.weeklyScores[uid].push(entry);d.stars[uid]=(d.stars[uid]||0)+5;notify('🎉 All 5 tasks done! +5 Stars earned!');}
  save(d);render();
}

let _uploadedExamData=null;

function previewUploadFile(input){
  const file=input.files[0]; if(!file) return;
  document.getElementById('up-filename').textContent=file.name;
  if(!document.getElementById('up-title').value)
    document.getElementById('up-title').value=file.name.replace(/\.html?$/i,'').replace(/[-_]/g,' ');
  const reader=new FileReader();
  reader.onload=function(e){
    const html=e.target.result;
    const match=html.match(/<script[^>]*id=["']lms-exam-data["'][^>]*>([\s\S]*?)<\/script>/i);
    if(match){
      try{
        _uploadedExamData=JSON.parse(match[1].trim());
        _uploadedExamData._type='lms';
        if(!document.getElementById('up-title').value&&_uploadedExamData.title)
          document.getElementById('up-title').value=_uploadedExamData.title;
        const q=_uploadedExamData.questions||[];
        document.getElementById('up-preview').style.display='block';
        document.getElementById('up-preview').innerHTML=`<div style="background:#d1fae5;border:1px solid #6ee7b7;border-radius:8px;padding:12px;font-size:13px">✅ <strong>LMS Exam:</strong> "${_uploadedExamData.title}" — ${q.length} question${q.length!==1?'s':''}${_uploadedExamData.timeLimit?` • ⏱ ${_uploadedExamData.timeLimit} min`:''}</div>`;
      }catch(err){
        _uploadedExamData=null;
        document.getElementById('up-preview').style.display='block';
        document.getElementById('up-preview').innerHTML='<div style="background:#fee2e2;border-radius:8px;padding:12px;font-size:13px">❌ Could not parse exam data.</div>';
      }
    }else{
      _uploadedExamData={_type:'html',htmlContent:html,title:document.getElementById('up-title').value||file.name,questions:[],timeLimit:0};
      document.getElementById('up-preview').style.display='block';
      document.getElementById('up-preview').innerHTML=`<div style="background:#eff6ff;border:1px solid #93c5fd;border-radius:8px;padding:12px;font-size:13px">🌐 <strong>External HTML exam detected.</strong> Will be embedded for students.<div style="margin-top:6px;color:var(--muted);font-size:12px">Scores must be entered manually by the teacher. The HTML file will be saved in Firebase for all student devices.</div></div>`;
    }
  };
  reader.readAsText(file);
}

function confirmExamUpload(){
  if(!_uploadedExamData){notify('❌ Please select an HTML exam file first.');return;}
  const title=(document.getElementById('up-title')?.value||'').trim()||_uploadedExamData.title||'Uploaded Exam';
  const classId=document.getElementById('up-class')?.value||'all';
  const status=document.getElementById('up-status')?.value||'draft';
  const isExternal=_uploadedExamData._type==='html';
  if(!isExternal&&(_uploadedExamData.questions||[]).length===0){notify('❌ Exam has no questions.');return;}
  const qCount=(_uploadedExamData.questions||[]).length;
  const classes=classId==='all'?['8-1','8-2','8-3','8-4']:[classId];
  const d=store();
  classes.forEach((cls,i)=>{
    const exam={id:'exam'+Date.now()+i,title,description:_uploadedExamData.description||(isExternal?'External HTML Exam':''),classId:cls,timeLimit:_uploadedExamData.timeLimit||30,questions:_uploadedExamData.questions||[],status,createdAt:new Date().toISOString().split('T')[0],...(isExternal&&{htmlContent:_uploadedExamData.htmlContent,examType:'html'})};
    d.exams.push(exam);
    if(status==='active')(CLASSES[cls]||[]).forEach(s=>{d.monitor[s.id]=d.monitor[s.id]||'not_started';});
  });
  const savedQCount=qCount;
  save(d);_uploadedExamData=null;closeModal();
  const target=classId==='all'?'All Classes':`Class ${classId}`;
  notify(`✅ "${title}" uploaded to ${target}${isExternal?' (external HTML)':` — ${savedQCount} questions`}`);
  render();
}

// ═══════════════════════════════════════
//  EXPORT EXAM
// ═══════════════════════════════════════
function exportExam(id){
  const d=store();const exam=d.exams.find(e=>e.id===id);if(!exam){notify('❌ Exam not found');return;}
  const data={title:exam.title,description:exam.description,timeLimit:exam.timeLimit,questions:exam.questions};
  const json=JSON.stringify(data,null,2);
  const html=`<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<title>${exam.title} — Ashraf LMS Export</title>\n<style>body{font-family:'Segoe UI',sans-serif;background:#f1f5f9;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}.box{background:#fff;border-radius:16px;padding:32px;max-width:560px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.1);text-align:center}h2{color:#2563eb;margin-bottom:8px}p{color:#64748b;font-size:14px}.badge{display:inline-block;background:#eff6ff;color:#2563eb;border-radius:20px;padding:4px 14px;font-size:13px;font-weight:600;margin:4px}</style>\n</head>\n<body>\n<div class="box"><div style="font-size:48px">📝</div><h2>${exam.title}</h2><p>${exam.description||''}</p><div style="margin:16px 0"><span class="badge">⏱ ${exam.timeLimit} min</span><span class="badge">❓ ${exam.questions.length} questions</span></div><p style="font-size:12px;color:#94a3b8">Ashraf LMS exam export — upload via ⬆️ Upload Exam</p></div>\n<script id="lms-exam-data" type="application/json">\n${json}\n<\/script>\n</body>\n</html>`;
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=exam.title.replace(/[^a-z0-9]/gi,'_').toLowerCase()+'.html';
  a.click();URL.revokeObjectURL(a.href);
  notify(`✅ "${exam.title}" exported`);
}
</script>
